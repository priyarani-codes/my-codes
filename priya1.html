<!DOCTYPE html>
<html>
<head>
    <title>Color Box</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        #box {
            width: 250px;
            height: 150px;
            background-color: yellow;
            margin: 20px auto;
            padding: 10px;
            border: 2px solid black;
        }

        .btn {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            cursor: pointer;
            color: white;
        }
    </style>
</head>
<body>

    <!-- Box -->
    <div id="box">
        <h3>Dabaa</h3>
    </div>

    <!-- Text OUTSIDE box -->
    <p id="text">Hello I am Yellow</p>

    <!-- Buttons -->
    <button class="btn" style="background-color: red;" onclick="changeColor('red')">Red</button>
    <button class="btn" style="background-color: blue;" onclick="changeColor('blue')">Blue</button>
    <button class="btn" style="background-color: green;" onclick="changeColor('green')">Green</button>
    <button class="btn" style="background-color: orange;" onclick="changeColor('orange')">Orange</button>
    <button class="btn" style="background-color: purple;" onclick="changeColor('purple')">Purple</button>

    <script>
        function changeColor(color) {
            document.getElementById("box").style.backgroundColor = color;
            document.getElementById("text").innerText = "Hello I am " + color;
        }
    </script>

</body>
</html>
